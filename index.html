<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POST XHR CRUD</title>

    <link rel="stylesheet" 
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" 
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" 
        crossorigin="anonymous">

    <link rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
        crossorigin="anonymous" 
        referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./assests/css/style.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-header text-center">
                        <h2>COMMENTS XHR</h2>
                    </div>
                    <div class="card-body">
                        <form action="" id="inputForm">
                            <div class="form-group">
                                <label for="title" class="font-weight-bold" >
                                    TITLE*
                                </label>
                                <input type="text" required class="form-control" id="title">
                            </div>

                            <div class="form-group">
                                <label for="body" class="font-weight-bold" >
                                    BODY*
                                </label>
                                <textarea rows="4" type="text" required class="form-control" id="body"></textarea>
                            </div>

                            <div class="form-group">
                                <label for="userId" class="font-weight-bold" >
                                    USER_ID*
                                </label>
                                <select class="form-control" required id="userId">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10</option>
                                </select>
                            </div>

                            <button class="btn btn-sm btn-block btn-outline-info" id="AddBtn">
                                ADD POST XHR
                            </button>

                            <button type="button" class="d-none btn btn-sm btn-block btn-outline-dark" id="UpdateBtn">
                                UPDATE POST XHR
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-md-12 my-4">
                <div class="card">
                    <div class="card-header text-center bg-danger   ">
                        <h2>POST XHR CRUD</h2>
                    </div>

                    <div class="card-body ">
                        <table class="table table-bordered">
                            <thead>
                                <tr>
                                    <th>userId</th>
                                    <th>Title</th>
                                    <th>Body</th>
                                    <th>Edit</th>
                                    <th>Remove</th>
                                </tr>
                            </thead>

                            <tbody  id="cardContainer">
                              
                            </tbody> 

                            

                            
                        </table>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="spinner d-none" id="spinner">
        <div class="spinner-border" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>
    


    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assests/js/app.js"></script>
</body>
</html>
